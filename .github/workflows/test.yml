name: Tests

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
    outputs:
      summary_ids:
        description: "IDs of the test summary artifact"
        value: ${{ jobs.collect-ids.outputs.summary_ids }}

jobs:
  test-debian:
    name: "Test debian"
    uses: ./.github/workflows/test-distro.yml
    secrets: inherit
    with:
      build_id: "${{ inputs.build_id }}"
      #devices: "lemans-evk,monaco-evk,qcs615-ride,qcs6490-rb3gen2-vision-kit,qcs8300-ride,qcs9100-ride-r3,qrb2210-rb1"
      devices: "qrb2210-rb1"
      devices_premerge: "qrb2210-rb1"
      distro_name: "debian"
      project: "qcom-deb-images"

  collect-ids:
    name: "Collect Summary artifact IDs"
    needs: [test-debian]
    if: |
      always()
      && contains(needs.*.result, 'success')
      && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    outputs:
      summary_ids: ${{ steps.generate-summary.outputs.artifact_ids }}
    steps:
      - name: Summary IDs
        id: generate-summary
        run: |
          echo "artifact_ids=${{ needs.test-debian.outputs.summary_id }}" >> $GITHUB_OUTPUT
