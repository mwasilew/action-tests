name: Tests

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      git_ref:
        required: false
        default: ''
        type: string
        description: "Ref in the repo which should be used for the tests"
    outputs:
      summary_ids:
        description: "IDs of the test summary artifact"
        value: ${{ jobs.collect-ids.outputs.summary_ids }}

env:
  LAVA_TEST_PLANS_REF: "debian-support"

jobs:
  prepare-env:
    name: Prepare environment
    runs-on: ubuntu-latest
    steps:
      - name: "Print ref"
        shell: bash
        run: |
          echo "lava-test-plans ref: ${{ env.LAVA_TEST_PLANS_REF }}"
      - name: "Check event file"
        id: check-event-file
        uses: LIT-Protocol/artifact-exists-action@v0
          with:
          name: "Event File"
      - name: "Download event file"
        if: ${{ steps.check-event-file.outputs.exists }}
        uses: actions/download-artifact@v7
        with:
            run-id: ${{ inputs.build_id }}
            path: artifacts
            github-token: ${{ github.token }}
            name: "Event File"
      - name: "Determine target branch"
        id: target-branch
        env:
          EVENT_FILE_EXISTS: "${{ steps.check-event-file.output.exists }}"
        shell: bash
        run: |
          TARGET_BRANCH=main
          if [ "${EVENT_FILE_EXISTS}" = "true" ]; then
              TARGET_BRANCH=$(cat "artifacts/Event File/event.json" | jq -r ".pull_request.base.ref")
          fi
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_OUTPUT
    outputs:
      lava-test-plans-ref: "${{ env.LAVA_TEST_PLANS_REF }}"
      target-branch: "${{ steps.target-branch.outputs.TARGET_BRANCH }}"
  test-nodistro:
    needs: [prepare-env]
    name: "Test nodistro"
    uses: ./.github/workflows/test-distro.yml
    secrets: inherit
    with:
      build_id: "${{ inputs.build_id }}"
      devices: "iq-8275-evk,iq-9075-evk,qcm6490-idp,qcs615-ride,rb3gen2-core-kit,qcs8300-ride-sx,qcs9100-ride-sx,dragonboard-410c,dragonboard-820c,rb1-core-kit"
      project_name: "meta-qcom"
      distro_name: "nodistro"
      lava_test_plans_ref: "${{ needs.prepare-env.outputs.lava-test-plans-ref }}"
      git_ref: ${{ inputs.git_ref }}
  test-qcom-distro:
    needs: [prepare-env]
    name: "Test qcom-distro"
    uses: ./.github/workflows/test-distro.yml
    secrets: inherit
    with:
      build_id: "${{ inputs.build_id }}"
      devices: "glymur-crd,iq-8275-evk,iq-9075-evk,qcm6490-idp,qcs615-ride,rb3gen2-core-kit,qcs8300-ride-sx,qcs9100-ride-sx,rb1-core-kit"
      devices_premerge: "iq-8275-evk,iq-9075-evk,qcm6490-idp,qcs615-ride,rb3gen2-core-kit,qcs8300-ride-sx,qcs9100-ride-sx,rb1-core-kit"
      project_name: "meta-qcom"
      distro_name: "qcom-distro"
      lava_test_plans_ref: "${{ needs.prepare-env.outputs.lava-test-plans-ref }}"
      git_ref: ${{ inputs.git_ref }}
  test-qcom-distro_linux-qcom-6-18:
    needs: [prepare-env]
    if: ${{ needs.prepare-env.outputs.target-branch == "main" }}
    name: "Test qcom-distro_linux-qcom-6.18"
    uses: ./.github/workflows/test-distro.yml
    secrets: inherit
    with:
      build_id: "${{ inputs.build_id }}"
      devices: "iq-8275-evk,iq-9075-evk,qcm6490-idp,qcs615-ride,rb3gen2-core-kit,qcs8300-ride-sx,qcs9100-ride-sx,rb1-core-kit"
      devices_premerge: "iq-8275-evk,iq-9075-evk,qcm6490-idp,qcs615-ride,rb3gen2-core-kit,qcs8300-ride-sx,qcs9100-ride-sx,rb1-core-kit"
      distro_name: "qcom-distro"
      project_name: "meta-qcom"
      distro_suffix: "_linux-qcom-6.18"
      lava_test_plans_ref: "${{ needs.prepare-env.outputs.lava-test-plans-ref }}"
      git_ref: ${{ inputs.git_ref }}
  test-debian:
    needs: [prepare-env]
    name: "Test debian"
    uses: ./.github/workflows/test-distro.yml
    secrets: inherit
    with:
      build_id: "${{ inputs.build_id }}"
      devices: "glymur-crd,qrb2210-rb1,qrb2210-arduino-imola"
      devices_premerge: "glymur-crd,qrb2210-rb1,qrb2210-arduino-imola"
      project_name: "qcom-deb-images"
      distro_name: "debian"
      lava_test_plans_ref: "${{ needs.prepare-env.outputs.lava-test-plans-ref }}"
      git_ref: ${{ inputs.git_ref }}

  collect-ids:
    name: "Collect Summary artifact IDs"
    needs: [test-nodistro, test-qcom-distro, test-debian]
    if: |
      always()
      && contains(needs.*.result, 'success')
      && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    outputs:
      summary_ids: ${{ steps.generate-summary.outputs.artifact_ids }}
    steps:
      - name: Summary IDs
        id: generate-summary
        run: |
          if [ -n "${{ jobs.test-qcom-distro_linux-qcom-6-18.outputs.summary_id }}" ]; then
              ARTIFACT_IDS="${{ jobs.test-qcom-distro_linux-qcom-6-18.outputs.summary_id }},"
          fi
          echo "artifact_ids=${ARTIFACT_IDS}${{ needs.test-nodistro.outputs.summary_id }},${{ needs.test-qcom-distro.outputs.summary_id }},${{ needs.test-debian.outputs.summary_id }}" >> $GITHUB_OUTPUT
